# RoBERTa fine-tuning configuration for LIAR 6-class classification.
#
# Changes vs. previous config (and why):
# - max_length: 64 was enough (mean statement length ~17 tokens, p99 ~40).
#   Using 128 wasted compute and made MPS OOM more likely without improving metrics.
# - batch_size: 16 with gradient_accumulation_steps=2 gives effective batch 32,
#   which is the sweet spot for LIAR-sized datasets with RoBERTa.
# - learning_rate: 1e-5 (was 2e-5). RoBERTa on LIAR is notoriously unstable;
#   2e-5 routinely lands in degenerate local minima (all predictions -> 'half-true').
# - epochs: 6 with early stopping, patience 2. Most seeds converge in 3-5 epochs.
# - warmup_ratio: 0.06, matching the original RoBERTa paper.
# - added: label_smoothing (0.05) to regularize on ordinal labels.
# - added: dropout 0.2 (was 0.1), mitigates overfitting on the small LIAR train set.
# - added: multi-seed reporting (mean ± std over `seeds`).
# - added: ordinal-aware loss (CE + squared EMD) so the truthfulness scale
#   penalises distant confusions more than adjacent ones.

model:
  name: roberta-base
  max_length: 64
  num_labels: 6
  hidden_dropout_prob: 0.2
  attention_probs_dropout_prob: 0.2

training:
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-5
  # Epochs raised from 6 → 10. RoBERTa on LIAR typically peaks by epoch 5-7
  # but the extra budget + early stopping gives slower-converging seeds room.
  epochs: 10
  warmup_ratio: 0.06
  weight_decay: 0.01
  gradient_clip: 1.0
  label_smoothing: 0.05
  log_every_steps: 100
  seed: 42
  seeds:
    - 42
    - 1337
    - 2024
  early_stopping_patience: 2
  loss:
    type: ordinal
    ce_weight: 1.0
    emd_weight: 0.5

runtime:
  device: auto
  device_priority:
    - cuda
    - mps
    - cpu
  num_workers: 0
  pin_memory: false
  max_train_samples:
  max_valid_samples:

paths:
  output_dir: models/roberta_liar/
  logs_dir: reports/transformer_logs/
  best_checkpoint: models/roberta_liar/best_model.pt
