model:
  name: roberta-base
  max_length: 128
  num_labels: 6
  hidden_dropout_prob: 0.1

training:
  batch_size: 8
  learning_rate: 2.0e-5
  epochs: 5
  warmup_ratio: 0.1
  weight_decay: 0.01
  gradient_clip: 1.0
  gradient_accumulation_steps: 1
  log_every_steps: 100
  seed: 42

runtime:
  device: auto
  device_priority:
    - cuda
    - mps
    - cpu
  num_workers: 0
  pin_memory: false
  max_train_samples:
  max_valid_samples:

paths:
  output_dir: models/roberta_liar/
  logs_dir: reports/transformer_logs/
  best_checkpoint: models/roberta_liar/best_model.pt
