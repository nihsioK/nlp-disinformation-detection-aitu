# Hybrid (text + metadata) fine-tuning configuration.
#
# Starts from the tuned transformer config (config/transformer.yaml) and adds
# a metadata branch. Key design choices:
# - Same encoder lr as text-only baseline (1e-5) to keep the comparison honest.
# - Separate (higher) lr for the metadata + fusion head since those params are
#   trained from scratch and can tolerate a larger step.
# - `use_metadata: true` trains the full hybrid; flip to false to reproduce
#   the text-only RoBERTa ablation through the exact same code path.
# - `metadata.leakage_corrected: true` uses credibility counts with the row's
#   own verdict removed, which is the defensible default for thesis numbers.
#   Set to false (or run `make hybrid-leaky`) to reproduce the prior-art
#   leaky setup for comparison.

model:
  name: roberta-base
  max_length: 64
  num_labels: 6
  hidden_dropout_prob: 0.2
  attention_probs_dropout_prob: 0.2
  use_metadata: true
  # Metadata vector bumped from 64 → 128 so the metadata branch carries more
  # weight relative to the 768-d [CLS] embedding when the two are concatenated.
  metadata_output_dim: 128
  metadata_embedding_dim: 16
  fusion_hidden_dim: 128
  fusion_dropout: 0.2

metadata:
  categorical_fields:
    - speaker
    - party
    - job
    - state
    - subject
    - context
  # Per-field hash buckets. `speaker` has ~3000 unique values on LIAR train,
  # so 256 buckets would average ~12 collisions per bucket exactly on the
  # most predictive field; 4096 brings the speaker collision rate close to 1.
  # Low-cardinality fields (`party`, `state`) keep small bucket counts to
  # avoid wasted embedding rows.
  num_buckets:
    speaker: 4096
    party: 64
    job: 1024
    state: 256
    subject: 1024
    context: 1024
  leakage_corrected: true

training:
  batch_size: 16
  gradient_accumulation_steps: 2
  encoder_learning_rate: 1.0e-5
  head_learning_rate: 5.0e-4
  # Epochs raised from 6 → 12 after observing val macro-F1 still monotonically
  # rising at epoch 6 (0.278 → 0.444). Early stopping on val macro-F1 with
  # patience=2 keeps the wall-clock bounded for seeds that plateau earlier.
  epochs: 12
  warmup_ratio: 0.06
  weight_decay: 0.01
  gradient_clip: 1.0
  label_smoothing: 0.05
  log_every_steps: 100
  seed: 42
  # Multi-seed reporting. Headline numbers are mean ± std over these seeds;
  # set to a single-element list to reproduce a single deterministic run.
  seeds:
    - 42
    - 1337
    - 2024
  early_stopping_patience: 2
  loss:
    # `ordinal` blends weighted CE with squared Earth Mover's Distance (CDF
    # difference) so misclassifications further down the truthfulness scale
    # cost more than adjacent-class confusions. Set type to `ce` and
    # `emd_weight: 0` to recover the previous behaviour.
    type: ordinal
    ce_weight: 1.0
    emd_weight: 0.5

runtime:
  device: auto
  device_priority:
    - cuda
    - mps
    - cpu
  num_workers: 0
  pin_memory: false
  max_train_samples:
  max_valid_samples:

paths:
  output_dir: models/hybrid_liar/
  logs_dir: reports/hybrid_logs/
  best_checkpoint: models/hybrid_liar/best_model.pt
