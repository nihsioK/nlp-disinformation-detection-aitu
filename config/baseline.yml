tfidf:
  max_features: 50000
  ngram_range: [1, 2]
  min_df: 2
  sublinear_tf: true

svm:
  kernel: linear
  C: 1.0
  max_iter: 5000
  class_weight: balanced

naive_bayes:
  alpha: 1.0

random_forest:
  n_estimators: 200
  max_depth: 20
  min_samples_leaf: 2
  class_weight: balanced
  n_jobs: -1
  random_state: 42
