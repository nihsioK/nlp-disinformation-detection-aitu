# Baseline TF-IDF + classical classifier configuration.
#
# Notes:
# - ngram_range (1,2) with min_df=3 keeps the vocabulary ~25-40k, which matches
#   what LIAR papers typically use. (1,3) with min_df=2 blew up to ~150k features
#   and hurt macro-F1 due to variance.
# - sublinear_tf=true consistently helps on short political statements.
# - LinearSVC: C=0.5 + dual='auto' + max_iter=10000 converges reliably on LIAR;
#   C=1.0 was slightly overfitting.
# - RandomForest: max_depth=None (unbounded) was better than max_depth=20 on LIAR.
#   min_samples_leaf=1 likewise.
# - RandomForest: n_estimators was 400 with max_depth=None and the pickled
#   model was ~500 MB, which blew the repo artifact budget with no measurable
#   macro-F1 benefit. max_depth=40 caps per-tree memory, n_estimators=200
#   roughly halves the forest without a statistically significant drop on LIAR.

tfidf:
  max_features: 60000
  ngram_range: [1, 2]
  min_df: 3
  max_df: 0.95
  sublinear_tf: true

svm:
  kernel: linear
  C: 0.5
  max_iter: 10000
  class_weight: balanced

naive_bayes:
  alpha: 0.3

random_forest:
  n_estimators: 200
  max_depth: 40
  min_samples_leaf: 1
  class_weight: balanced_subsample
  n_jobs: -1
  random_state: 42
